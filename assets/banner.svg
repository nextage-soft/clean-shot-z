<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#387dfc"/>
      <stop offset="1" stop-color="#6b47f0"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- app mark: rounded square + viewfinder -->
  <g transform="translate(96 96)" filter="url(#soft)">
    <rect width="168" height="168" rx="40" fill="#ffffff" fill-opacity="0.16"/>
    <rect x="8" y="8" width="152" height="152" rx="34" fill="#ffffff" fill-opacity="0.10"/>
    <g transform="translate(84 84)" stroke="#ffffff" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M-46 -30 v-10 a6 6 0 0 1 6 -6 h10"/>
      <path d="M46 -30 v-10 a6 6 0 0 0 -6 -6 h-10"/>
      <path d="M-46 30 v10 a6 6 0 0 0 6 6 h10"/>
      <path d="M46 30 v10 a6 6 0 0 1 -6 6 h-10"/>
      <circle cx="0" cy="0" r="20"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="300" y="150" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1">CleanShot Z</text>
  <text x="302" y="196" fill="#ffffff" fill-opacity="0.92" font-size="26" font-weight="500">The open-source CleanShot X alternative for macOS</text>
  <text x="302" y="230" fill="#ffffff" fill-opacity="0.72" font-size="18" font-weight="500">100% Swift · zero dependencies · on-device · Apache 2.0</text>

  <!-- feature chips (text-only: SVG served via <img> on GitHub can't render color emoji) -->
  <g font-size="18" font-weight="600" fill="#ffffff">
    <g transform="translate(302 268)">
      <rect width="118" height="42" rx="21" fill="url(#chip)"/><text x="59" y="27" text-anchor="middle">Capture</text>
    </g>
    <g transform="translate(432 268)">
      <rect width="128" height="42" rx="21" fill="url(#chip)"/><text x="64" y="27" text-anchor="middle">Annotate</text>
    </g>
    <g transform="translate(572 268)">
      <rect width="80" height="42" rx="21" fill="url(#chip)"/><text x="40" y="27" text-anchor="middle">OCR</text>
    </g>
    <g transform="translate(664 268)">
      <rect width="164" height="42" rx="21" fill="url(#chip)"/><text x="82" y="27" text-anchor="middle">Scrolling</text>
    </g>
    <g transform="translate(840 268)">
      <rect width="70" height="42" rx="21" fill="url(#chip)"/><text x="35" y="27" text-anchor="middle">Pin</text>
    </g>
    <g transform="translate(922 268)">
      <rect width="100" height="42" rx="21" fill="url(#chip)"/><text x="50" y="27" text-anchor="middle">HEIC</text>
    </g>
  </g>
</svg>
